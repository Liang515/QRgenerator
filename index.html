<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium QR Studio - Smart Preview</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Studio">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --border: #D1D1D6;
            --fs-h2: clamp(1.6rem, 2.2vw, 2.4rem);
            --fs-section: clamp(16px, 1.4vw, 20px);
            --fs-label: clamp(14px, 1.2vw, 17px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", sans-serif; 
            background: var(--bg); height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; color: var(--text);
        }

        .app-container {
            display: flex; background: var(--card); 
            width: 98vw; height: 96vh;
            border-radius: 32px; box-shadow: 0 40px 100px rgba(0,0,0,0.15); 
            overflow: hidden; position: relative;
        }

        /* --- 控制面板 (左/下) --- */
        .controls {
            flex: 1.4; padding: clamp(25px, 4vw, 50px); display: flex; flex-direction: column; 
            gap: 20px; border-right: 1px solid var(--border); 
            overflow-y: auto; background: #FFFFFF; transition: all 0.4s ease;
        }

        @media (min-width: 1100px) {
            .control-grid {
                display: grid; grid-template-columns: 1fr 1fr; 
                column-gap: 40px; row-gap: 25px;
            }
        }

        /* --- 預覽區 (右/上) --- */
        .preview {
            flex: 1; background: #F9F9FB; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 收合按鈕 (預設桌機隱藏) */
        .toggle-preview {
            display: none;
            position: absolute; bottom: 10px; right: 20px;
            background: var(--primary); color: white; border: none;
            padding: 8px 16px; border-radius: 20px; font-weight: 700;
            font-size: 13px; cursor: pointer; z-index: 100;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }

        /* --- 手機版邏輯 --- */
        @media (max-width: 850px) {
            .app-container { flex-direction: column; height: 100vh; width: 100vw; border-radius: 0; }
            
            .preview { 
                flex: 0 0 35vh; /* 展開高度 */
                order: -1; 
                border-bottom: 1px solid var(--border);
                overflow: hidden;
            }

            /* 收合狀態樣式 */
            .preview.collapsed {
                flex: 0 0 50px; /* 收合高度：剛好留下一行按鈕空間 */
                padding: 0;
                background: #F2F2F7;
            }

            .preview.collapsed canvas {
                opacity: 0; transform: scale(0.8);
            }

            .toggle-preview { display: block; }
            .preview.collapsed .toggle-preview { bottom: 10px; }

            .controls { flex: 1; padding: 25px 20px; }
            body { overflow: auto; }
        }

        /* 標題與樣式保持上一版的高質感 */
        h2 { font-size: var(--fs-h2); font-weight: 800; letter-spacing: -1.2px; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #8E8E93; margin-bottom: 20px; }
        .section-title { 
            font-size: var(--fs-section); font-weight: 800; 
            color: var(--text); border-bottom: 3px solid var(--primary); 
            padding-bottom: 6px; width: fit-content; margin: 10px 0; grid-column: span 2;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: var(--fs-label); font-weight: 700; color: #3A3A3C; display: flex; justify-content: space-between; }
        label span { background: var(--bg); padding: 2px 10px; border-radius: 6px; color: var(--primary); font-size: 0.85em; }

        input[type="text"] {
            padding: 15px 18px; border: 2px solid var(--bg); border-radius: 14px; 
            font-size: 16px; background: #FBFBFD; transition: 0.2s; font-weight: 500;
        }
        input[type="text"]:focus { border-color: var(--primary); outline: none; background: #fff; }

        input[type="range"] { -webkit-appearance: none; height: 8px; background: var(--bg); border-radius: 10px; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--primary); border-radius: 50%; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .file-upload-wrapper {
            position: relative; width: 100%; height: 75px;
            border: 2px dashed var(--border); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; background: #FBFBFD;
        }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; font-size: 0; }
        .file-upload-text { text-align: center; color: #636366; font-size: 15px; font-weight: 500; }
        .file-upload-text b { color: var(--primary); }

        .color-row { display: flex; gap: 12px; }
        .color-item { flex: 1; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 45px; border-radius: 12px; cursor: pointer; }

        .btn-down { 
            background: linear-gradient(135deg, #007AFF, #0040B0); color: white; border: none;
            padding: 20px; border-radius: 18px; font-weight: 800; font-size: 18px; 
            cursor: pointer; margin-top: auto; box-shadow: 0 12px 25px rgba(0,122,255,0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-down:hover { transform: translateY(-3px); }

        canvas { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            border-radius: 20px; background: white; padding: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            transition: all 0.4s ease;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="controls">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <img src="logo.png" alt="App Logo" style="width: 50px; height: 50px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div>
                <h2 style="margin-bottom: 2px;">Premium QR Studio</h2>
                <p class="subtitle" style="margin-bottom: 0;">專業級高品質設計工作站</p>
            </div>
        </div>
        
        <div class="control-grid">
            <div class="section-title">內容設定</div>
            <div class="input-group"><label>目標網址</label><input type="text" id="urlInput" value="https://google.com"></div>
            <div class="input-group"><label>底部描述文字</label><input type="text" id="descInput" value="請掃描進入官方網站"></div>

            <div class="section-title">佈局參數</div>
            <div class="input-group"><label>QR 大小 <span id="qrVal">280</span></label><input type="range" id="qrSlider" min="150" max="500" value="280"></div>
            <div class="input-group"><label>描述字級 <span id="fontVal">22</span></label><input type="range" id="fontSlider" min="12" max="60" value="22"></div>
            <div class="input-group"><label>垂直間距 <span id="gapVal">25</span></label><input type="range" id="gapSlider" min="0" max="100" value="25"></div>
            <div class="input-group"><label>Logo 比例 <span id="logoVal">22</span>%</label><input type="range" id="logoSlider" min="10" max="35" value="22"></div>

            <div class="section-title">視覺風格</div>
            <div class="color-row">
                <div class="color-item"><label>文字顏色</label><input type="color" id="textColor" value="#1C1C1E"></div>
                <div class="color-item"><label>背景色</label><input type="color" id="bgColor" value="#FFFFFF"></div>
            </div>
            <div class="input-group">
                <label>中心標誌 (Logo)</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="logoInput" accept="image/*">
                    <div class="file-upload-text"><b>點擊或拖放圖片</b> (PNG, JPG, SVG)</div>
                </div>
            </div>
        </div>
        <button class="btn-down" onclick="downloadImage()">下載高清 PNG 成品</button>
    </div>

    <div class="preview" id="previewArea">
        <button class="toggle-preview" id="toggleBtn" onclick="togglePreview()">收合預覽</button>
        <canvas id="mainCanvas"></canvas>
        <div id="hidden-qr" style="display:none;"></div>
    </div>
</div>

<script>
    // 控制預覽展開收合
    function togglePreview() {
        const preview = document.getElementById('previewArea');
        const btn = document.getElementById('toggleBtn');
        const isCollapsed = preview.classList.toggle('collapsed');
        btn.innerText = isCollapsed ? "展開預覽 👁️" : "收合預覽 ✕";
    }

    function debounce(func, timeout = 100) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    // --- QR 渲染邏輯 ---
    const ids = ['urlInput', 'descInput', 'qrSlider', 'fontSlider', 'gapSlider', 'logoSlider', 'textColor', 'bgColor', 'logoInput'];
    const debouncedRender = debounce(render, 80);
    ids.forEach(id => document.getElementById(id).addEventListener('input', debouncedRender));

    async function render() {
        const url = document.getElementById('urlInput').value;
        const desc = document.getElementById('descInput').value;
        const qrSize = parseInt(document.getElementById('qrSlider').value);
        const fontSize = parseInt(document.getElementById('fontSlider').value);
        const gap = parseInt(document.getElementById('gapSlider').value);
        const logoScale = parseInt(document.getElementById('logoSlider').value) / 100;
        const txtCol = document.getElementById('textColor').value;
        const bgCol = document.getElementById('bgColor').value;
        const logoFile = document.getElementById('logoInput').files[0];

        document.getElementById('qrVal').innerText = qrSize;
        document.getElementById('fontVal').innerText = fontSize;
        document.getElementById('gapVal').innerText = gap;
        document.getElementById('logoVal').innerText = Math.round(logoScale * 100);

        if (!url) return;
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const hiddenQr = document.getElementById('hidden-qr');
        hiddenQr.innerHTML = "";
        new QRCode(hiddenQr, { text: url, width: qrSize, height: qrSize, correctLevel: QRCode.Level ? QRCode.Level.H : 3 });

        setTimeout(async () => {
            const qrImg = hiddenQr.querySelector('img');
            if(!qrImg) return;
            const padding = 60;
            const lineHeight = fontSize * 1.4;
            ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
            const lines = [];
            let cur = "";
            for (let c of desc) {
                if (ctx.measureText(cur + c).width > qrSize) { lines.push(cur); cur = c; }
                else { cur += c; }
            }
            lines.push(cur);

            const textTotalHeight = lines.length * lineHeight;
            const baseWidth = qrSize + padding * 2;
            const baseHeight = padding * 2 + qrSize + gap + textTotalHeight;

            // Retina 螢幕（高解析度）優化
            const dpr = window.devicePixelRatio || 1;
            canvas.width = baseWidth * dpr;
            canvas.height = baseHeight * dpr;
            canvas.style.width = baseWidth + "px";
            canvas.style.height = baseHeight + "px";

            // 縮放 Context
            ctx.scale(dpr, dpr);

            ctx.fillStyle = bgCol;
            ctx.fillRect(0, 0, baseWidth, baseHeight);
            ctx.drawImage(qrImg, padding, padding, qrSize, qrSize);

            let logoImgToDraw = null;
            if (logoFile) {
                logoImgToDraw = await readAsImage(logoFile);
            } else {
                logoImgToDraw = await new Promise(res => {
                    const i = new Image();
                    i.onload = () => res(i);
                    i.onerror = () => res(null);
                    i.src = 'logo.png';
                });
            }

            if (logoImgToDraw) {
                const s = qrSize * logoScale;
                const x = (baseWidth - s) / 2, y = padding + (qrSize - s) / 2;
                ctx.fillStyle = bgCol;
                ctx.beginPath();
                ctx.roundRect(x - 8, y - 8, s + 16, s + 16, 12);
                ctx.fill();
                ctx.drawImage(logoImgToDraw, x, y, s, s);
            }
            ctx.fillStyle = txtCol;
            ctx.textAlign = "center";
            ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
            lines.forEach((l, i) => {
                ctx.fillText(l, baseWidth / 2, padding + qrSize + gap + fontSize + (i * lineHeight));
            });
        }, 80);
    }
    function readAsImage(f) { return new Promise(res => { const r = new FileReader(); r.onload = e => { const i = new Image(); i.onload = () => res(i); i.src = e.target.result; }; r.readAsDataURL(f); }); }
    function downloadImage() { const link = document.createElement('a'); link.download = `QR_Design_${Date.now()}.png`; link.href = document.getElementById('mainCanvas').toDataURL('image/png', 1.0); link.click(); }
    window.onload = render;
</script>
</body>
</html>
